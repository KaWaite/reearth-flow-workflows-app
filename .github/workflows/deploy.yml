name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          # Shared API key — repository secret
          VITE_FLOW_API_KEY: ${{ secrets.FLOW_API_KEY }}
          # Per-workflow trigger URLs — repository variables
          VITE_FLOW_URL_CSV_QUALITY: ${{ vars.FLOW_URL_CSV_QUALITY }}
          VITE_FLOW_URL_GEOJSON: ${{ vars.FLOW_URL_GEOJSON }}
          VITE_FLOW_URL_CSV_MERGE: ${{ vars.FLOW_URL_CSV_MERGE }}
          VITE_FLOW_URL_COL_SELECT: ${{ vars.FLOW_URL_COL_SELECT }}
          VITE_FLOW_URL_CSV_SPLIT: ${{ vars.FLOW_URL_CSV_SPLIT }}
          VITE_FLOW_URL_CSV_JSON: ${{ vars.FLOW_URL_CSV_JSON }}
          VITE_FLOW_URL_SPATIAL_FILTER: ${{ vars.FLOW_URL_SPATIAL_FILTER }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
